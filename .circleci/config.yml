version: 2.1

jobs:
  policy-check:
    docker:
      - image: cimg/base:2024.12
    resource_class: small
    steps:
      - checkout
      - run:
          name: Install conftest
          command: |
            curl -fsSL -o /tmp/conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz
            tar -xzf /tmp/conftest.tar.gz -C /tmp
            sudo mv /tmp/conftest /usr/local/bin/conftest
      - run:
          name: Verify policy unit tests
          command: |
            conftest verify --policy policy/env
            conftest verify --policy policy/charts
      - run:
          name: Check Terraform environment policies
          command: conftest test terraform/environments/*.tfvars --policy policy/env --parser hcl2
      - run:
          name: Check chart default policies
          command: conftest test terraform/charts/catalog/values.yaml terraform/charts/cart/values.yaml terraform/charts/checkout/values.yaml terraform/charts/orders/values.yaml terraform/charts/ui/values.yaml --policy policy/charts --parser yaml

  qa-load-test:
    docker:
      - image: cimg/base:2024.12
    resource_class: medium
    environment:
      TARGET_ENV: qa
      TARGET_URL: https://qa.codex-devops.pp.ua
      K6_VUS: "10"
      K6_DURATION: "300s"
      K6_SLEEP: "1"
      LOAD_TEST_SOURCE: circleci-qa-to-staging-pr
      LOAD_TEST_HEADER_NAME: X-Load-Test-Scenario
      LOAD_TEST_HEADER_VALUE: qa-to-staging-pr-opened
    steps:
      - checkout
      - run:
          name: Install k6
          command: |
            sudo gpg -k
            sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
            echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
            sudo apt-get update
            sudo apt-get install -y k6
      - run:
          name: Run QA load test
          command: |
            mkdir -p load-tests/results
            k6_exit_code=0
            k6 run load-tests/qa.js || k6_exit_code=$?
            cat load-tests/results/summary.txt || true
            printf '%s' "${k6_exit_code}" > load-tests/results/k6_exit_code.txt
      - store_artifacts:
          path: load-tests/results
          destination: qa-load-test-results
      - run:
          name: Fail job when load test fails
          command: |
            exit "$(cat load-tests/results/k6_exit_code.txt)"

workflows:
  validate:
    jobs:
      - policy-check

  qa-to-staging-pr-load-test:
    when: >
      pipeline.event.name == "pull_request" and
      pipeline.event.action == "opened" and
      pipeline.event.github.pull_request.head.ref == "qa" and
      pipeline.event.github.pull_request.base.ref == "staging"
    jobs:
      - qa-load-test
