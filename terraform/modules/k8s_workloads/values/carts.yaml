image:
  repository: ${image_repository}
  tag: ${image_tag}

metrics:
  serviceMonitor:
    enabled: ${service_monitor_enabled}

serviceAccount:
  name: carts
  annotations:
    eks.amazonaws.com/role-arn: ${role_arn}

%{ if opentelemetry_enabled }
opentelemetry:
  enabled: true
  instrumentation: ${opentelemetry_instrumentation}
%{ endif }

app:
  persistence:
    provider: dynamodb
    dynamodb:
      tableName: ${table_name}
